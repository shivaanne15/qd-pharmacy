<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="QD Pharmacy logo">
  <defs>
    <path id="topArc" d="M 14 78 A 87 60 0 0 1 186 78" fill="none"/>
    <path id="bottomArc" d="M 20 64 A 83 58 0 0 0 180 64" fill="none"/>
  </defs>

  <!-- Outer oval ring -->
  <ellipse cx="100" cy="70" rx="93" ry="65" fill="#ffffff"/>
  <ellipse cx="100" cy="70" rx="93" ry="65" fill="none" stroke="#1d3557" stroke-width="15"/>

  <!-- Ring text -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="700" fill="#ffffff" letter-spacing="1.6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">AT YOUR CARE</textPath>
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="1.2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">IN WALNUT CREEK, CA</textPath>
  </text>

  <!-- Rx marks -->
  <text x="24" y="74" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1d3557">&#8478;</text>
  <text x="164" y="74" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1d3557">&#8478;</text>

  <!-- Leaves -->
  <path d="M 103 24 C 110 14 122 12 128 16 C 126 26 116 32 106 30 Z" fill="#4a9b6e"/>
  <path d="M 102 28 C 96 18 86 15 79 19 C 81 29 92 34 100 32 Z" fill="#3c7f5a"/>

  <!-- Pestle -->
  <line x1="66" y1="34" x2="94" y2="62" stroke="#1d3557" stroke-width="8" stroke-linecap="round"/>
  <circle cx="65" cy="33" r="6.5" fill="#1d3557"/>

  <!-- Mortar bowl -->
  <path d="M 56 58 L 144 58 C 144 82 126 94 100 94 C 74 94 56 82 56 58 Z" fill="none" stroke="#1d3557" stroke-width="5" stroke-linejoin="round"/>
  <line x1="50" y1="58" x2="150" y2="58" stroke="#1d3557" stroke-width="5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="100" y="84" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="26" fill="#4a9b6e">Qd</text>
  <text x="100" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="15" letter-spacing="1.5" fill="#1d3557">PHARMACY</text>
</svg>
